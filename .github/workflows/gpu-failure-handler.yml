name: "GPU Pipeline Failure Handler"

# Triggers automatically when the GPU Pipeline workflow finishes.
# If it failed, this workflow downloads the log artifact, extracts error
# details, and creates a GitHub Issue assigned to the Copilot coding
# agent (bug-fixer profile) to investigate and fix the problem.

on:
  workflow_run:
    workflows: ["GPU Pipeline"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  handle-failure:
    runs-on: ubuntu-latest
    # Only act on actual failures; skip on success or cancellation
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download pipeline log artifact
        id: download
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = ${{ github.event.workflow_run.id }};
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });

            const logArtifact = artifacts.data.artifacts.find(a =>
              a.name.startsWith('pipeline-output-')
            );

            if (!logArtifact) {
              core.setOutput('has_log', 'false');
              console.log('No pipeline-output artifact found for this run.');
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: logArtifact.id,
              archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('/tmp/pipeline_output.zip', Buffer.from(download.data));
            core.setOutput('has_log', 'true');
            console.log(`Downloaded artifact: ${logArtifact.name}`);

      - name: Extract log
        if: steps.download.outputs.has_log == 'true'
        run: |
          unzip -o /tmp/pipeline_output.zip -d /tmp/pipeline_log/ 2>/dev/null || true
          ls /tmp/pipeline_log/ || true

      - name: Check existing auto-issues (loop guard)
        id: guard
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Count currently open auto-created failure issues
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "[Auto] GPU Pipeline failed" in:title`,
            });
            const openCount = search.data.total_count;
            console.log(`Open auto-failure issues: ${openCount}`);

            if (openCount >= 3) {
              console.log('Loop guard triggered: 3 or more open auto-failure issues already exist. Skipping issue creation.');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Create failure issue for Copilot agent
        if: steps.guard.outputs.skip == 'false'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const runId = ${{ github.event.workflow_run.id }};
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const headBranch = '${{ github.event.workflow_run.head_branch }}';
            const headSha = '${{ github.event.workflow_run.head_sha }}'.slice(0, 7);
            const triggeredBy = '${{ github.event.workflow_run.actor.login }}';
            const createdAt = '${{ github.event.workflow_run.created_at }}';

            // Try to determine the pipeline mode from the run name / jobs
            // Fallback: inspect log for clues
            let mode = 'unknown';
            let logExcerpt = '*(log not available)*';
            let shortError = 'pipeline did not complete successfully';

            const logPath = '/tmp/pipeline_log/pipeline_output.log';
            if (fs.existsSync(logPath)) {
              const log = fs.readFileSync(logPath, 'utf8');

              // Detect mode from log content -- check more-specific patterns first
              // to avoid misclassification (full-pipeline logs also contain train.py)
              if (log.includes('run_full_pipeline.py')) mode = 'full-pipeline';
              else if (log.includes('pytest') || log.includes('test session starts')) mode = 'evaluate';
              else if (log.includes('benchmark.py')) mode = 'benchmark';
              else if (log.includes('inference.py') && !log.includes('run_full_pipeline.py')) mode = 'inference-test';
              else if (log.includes('train.py') || log.includes('Training Started')) mode = 'finetune';

              // Extract last 80 lines as the most relevant excerpt
              const lines = log.split('\n');
              const tail = lines.slice(-80).join('\n');
              logExcerpt = tail.slice(0, 6000); // cap at 6000 chars

              // Extract first error line for the issue title
              const errorMatch = log.match(/(?:Error|Exception|FAILED|error)[^\n]{0,150}/i);
              if (errorMatch) {
                shortError = errorMatch[0].trim().slice(0, 120);
              }
            }

            const title = `[Auto] GPU Pipeline failed: ${mode} \u2014 ${shortError}`;

            // issueNumber is not known until after creation; use a placeholder
            // and update the body immediately after.
            const bodyLines = [
              '## GPU Pipeline Failure \u2014 Automated Report',
              '',
              `**Run:** [#${runId}](${runUrl})`,
              `**Mode:** \`${mode}\``,
              `**Branch:** \`${headBranch}\` (\`${headSha}\`)`,
              `**Triggered by:** @${triggeredBy}`,
              `**Time:** ${createdAt}`,
              '',
              '---',
              '',
              '## Task for Copilot Agent',
              '',
              '1. Read the error log below carefully to identify the root cause.',
              '2. Apply a minimal targeted fix \u2014 prefer fixing `Dockerfile`, `requirements.txt`, `config.docker.yaml`, or source code as appropriate.',
              '3. Run `python -m pytest tests/ -v` (via the Copilot environment) to validate any non-GPU changes.',
              '4. Open a PR with `Fixes #ISSUE_NUMBER` in the description (replace ISSUE_NUMBER with this issue\'s number).',
              '5. The GPU Pipeline will re-run automatically on the PR when it touches training-related files.',
              '6. Do NOT merge \u2014 human approval is required.',
              '',
              '### Common Docker/pipeline failure causes to check:',
              '',
              '- Missing Python packages in `Dockerfile` (pip install step)',
              '- Python version mismatch (Dockerfile uses 3.10, local may differ)',
              '- Missing or wrong paths in `config.docker.yaml` vs `config.yaml`',
              '- Volume mount issues in `docker-compose.yml`',
              '- Import errors due to missing dependencies in `requirements.txt`',
              '- Environment variables not passed to the container (`.env` file)',
              '',
              '---',
              '',
              '## Failure Log (last 80 lines)',
              '',
              '```',
              logExcerpt,
              '```',
              '',
              '---',
              '',
              '*This issue was created automatically by the GPU Pipeline Failure Handler workflow.*',
              '*Assigned to the `bug-fixer` Copilot agent. Auto-issues are capped at 3 open at a time.*',
            ];
            const body = bodyLines.join('\n');

            // Try to create the issue with copilot as assignee
            let issue;
            try {
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'priority:high', 'agent:bug-fixer'],
                assignees: ['copilot'],
              });
            } catch (assignErr) {
              console.log('Could not assign to copilot, creating without assignee:', assignErr.message);
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'priority:high', 'agent:bug-fixer'],
              });
            }

            console.log(`Created issue #${issue.data.number}: ${title}`);
            console.log(`Issue URL: ${issue.data.html_url}`);

            // Update the body to replace the ISSUE_NUMBER placeholder with the real number
            const realBody = body.replace('Fixes #ISSUE_NUMBER', `Fixes #${issue.data.number}`)
                                 .replace('replace ISSUE_NUMBER with this issue\'s number', `i.e. \`Fixes #${issue.data.number}\``);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              body: realBody,
            });

            // Write to job summary
            await core.summary
              .addHeading('GPU Pipeline Failure Handler')
              .addRaw(`\n\nCreated issue **[#${issue.data.number}: ${title}](${issue.data.html_url})** and assigned to Copilot bug-fixer agent.\n`)
              .write();
