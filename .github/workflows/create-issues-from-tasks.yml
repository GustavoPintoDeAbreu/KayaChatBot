name: "Create Issues from tasks.json"

on:
  push:
    branches: [main]
    paths:
      - tasks.json

permissions:
  issues: write
  contents: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issues from tasks.json
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const tasksPath = path.join(process.env.GITHUB_WORKSPACE, 'tasks.json');
            const raw = fs.readFileSync(tasksPath, 'utf8');
            const tasks = JSON.parse(raw);

            if (!Array.isArray(tasks) || tasks.length === 0) {
              console.log('No tasks to process.');
              return;
            }

            const agentLabelMap = {
              'bug-fixer': 'agent:bug-fixer',
              'feature-dev': 'agent:feature-dev',
              'test-specialist': 'agent:test-specialist'
            };

            const typeLabelMap = {
              'bug': 'bug',
              'feature': 'feature',
              'test': 'test',
              'improvement': 'improvement'
            };

            for (const task of tasks) {
              const labels = [];

              // Type label
              if (task.type && typeLabelMap[task.type]) {
                labels.push(typeLabelMap[task.type]);
              }

              // Priority label
              if (task.priority) {
                labels.push(`priority:${task.priority}`);
              }

              // Agent label
              if (task.agent && agentLabelMap[task.agent]) {
                labels.push(agentLabelMap[task.agent]);
              }

              // Build issue body
              let body = task.description || '';
              if (task.files_hint && task.files_hint.length > 0) {
                body += `\n\n**Relevant files:** ${task.files_hint.map(f => '`' + f + '`').join(', ')}`;
              }
              if (task.agent) {
                body += `\n\n**Custom agent:** \`${task.agent}\``;
              }

              try {
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: task.title,
                  body: body,
                  labels: labels,
                  assignees: ['copilot']
                });
                console.log(`Created issue #${issue.data.number}: ${task.title}`);
              } catch (err) {
                console.error(`Failed to create issue "${task.title}": ${err.message}`);
              }
            }

            // Clear tasks.json after processing
            fs.writeFileSync(tasksPath, '[]\n');
            console.log('Cleared tasks.json');

      - name: Commit cleared tasks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasks.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: clear processed tasks [skip ci]"
          git push
