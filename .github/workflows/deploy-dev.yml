name: Deploy (dev)

# Stages a dev release on merge to main: writes secrets to .env, rebuilds the
# image, and runs the test suite as a deploy gate. It does NOT keep a server
# running — the app is on-demand. Power it up with scripts/app_up.sh dev (or set
# the `start` input to true when running manually).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      start:
        description: "Power up the dev app after staging"
        type: boolean
        default: false

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: [self-hosted, gpu]
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          AZURE_OPENAI_API_KEY_gpt_41_mini=${{ secrets.AZURE_OPENAI_API_KEY_gpt_41_mini }}
          AZURE_OPENAI_API_KEY_gpt_53_chat=${{ secrets.AZURE_OPENAI_API_KEY_gpt_53_chat }}
          KAYA_WEB_USER=${{ secrets.KAYA_WEB_USER }}
          KAYA_WEB_PASS=${{ secrets.KAYA_WEB_PASS }}
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          EOF

      - name: Build dev image (cached)
        run: docker compose --profile dev build kaya-dev

      - name: Test gate
        run: docker compose --profile test run --rm kaya-test

      - name: Power up dev (optional)
        if: ${{ inputs.start == true }}
        run: ./scripts/app_up.sh dev

      - name: Summary
        run: |
          echo "### Dev release staged ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Power up: \`scripts/app_up.sh dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Then promote with the **Deploy (prod)** workflow." >> "$GITHUB_STEP_SUMMARY"
