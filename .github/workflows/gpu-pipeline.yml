name: "GPU Pipeline"

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "config.docker.yaml"
      - "data/train_synthetic.jsonl"
      - "data/val_synthetic.jsonl"
      - "run_full_pipeline.py"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"
      - ".github/scripts/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode to run"
        required: true
        default: "finetune"
        type: choice
        options:
          - finetune
          - evaluate
          - inference-test
          - full-pipeline
          - benchmark
          - judge-eval
          - compare
          - generate-datasets

permissions:
  contents: write
  pull-requests: write

jobs:
  gpu-pipeline:
    runs-on: self-hosted
    timeout-minutes: 240
    outputs:
      failed: ${{ steps.outcome.outputs.failed }}
      mode: ${{ steps.outcome.outputs.mode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine run mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=finetune" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare environment
        run: |
          # ---------------------------------------------------------------
          # Data directories are gitignored so the checkout lacks them.
          # Since this runner IS the project machine, we write a
          # docker-compose.override.yml that mounts the real project's
          # data/ and models/ directories directly. Docker Compose merges
          # the override automatically \u2014 no symlinks needed inside Docker.
          # ---------------------------------------------------------------
          REAL_PROJECT=/home/gustavo/Desktop/KayaChatBot

          mkdir -p models reports/benchmarks data

          # Write docker-compose.override.yml using echo to avoid heredoc
          # column-0 lines that break the YAML literal block scalar.
          {
            echo "services:"
            echo "  kaya-chatbot:"
            echo "    volumes:"
            echo "      - $REAL_PROJECT/data:/app/data"
            echo "      - $REAL_PROJECT/models:/app/models"
          } > docker-compose.override.yml

          echo "docker-compose.override.yml written:"
          cat docker-compose.override.yml

          echo ""
          echo "Real data directory contents:"
          ls -la "$REAL_PROJECT/data/"

          # Copy .env from real project so docker-compose env_file works
          # (env_file requires a plain file in CWD, not a symlink to elsewhere)
          if [[ -f "$REAL_PROJECT/.env" ]]; then
            cp "$REAL_PROJECT/.env" .env
            echo "Copied .env from $REAL_PROJECT"
          else
            touch .env
            echo "Warning: no .env found in $REAL_PROJECT, using empty .env"
          fi

      - name: Build Docker image
        run: docker-compose build

      - name: Run finetune
        if: steps.mode.outputs.mode == 'finetune'
        timeout-minutes: 240
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/finetuning/train.py 2>&1 | tee pipeline_output.log

      - name: Run full pipeline
        if: steps.mode.outputs.mode == 'full-pipeline'
        timeout-minutes: 240
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python run_full_pipeline.py 2>&1 | tee pipeline_output.log

      - name: Run evaluate (test suite)
        if: steps.mode.outputs.mode == 'evaluate'
        timeout-minutes: 10
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python -m pytest tests/ -v 2>&1 | tee pipeline_output.log

      - name: Run inference test
        if: steps.mode.outputs.mode == 'inference-test'
        timeout-minutes: 10
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/chat/inference.py 2>&1 | tee pipeline_output.log

      - name: Run benchmark
        if: steps.mode.outputs.mode == 'benchmark'
        timeout-minutes: 60
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/testing/benchmark.py \
            --judge-provider xai \
            --golden-tests data/golden_test_conversations.json \
            --emit-tasks \
            2>&1 | tee pipeline_output.log

      - name: Run judge-eval
        if: steps.mode.outputs.mode == 'judge-eval'
        timeout-minutes: 30
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/testing/conversation_tester.py --scenarios 10 --provider xai 2>&1 | tee pipeline_output.log

      - name: Run compare (A/B dataset comparison)
        if: steps.mode.outputs.mode == 'compare'
        timeout-minutes: 120
        continue-on-error: true
        run: |
          # Build both dataset variants and report differences
          docker-compose run --rm kaya-chatbot python run_full_pipeline.py --dataset-variant a 2>&1 | tee pipeline_output_a.log
          docker-compose run --rm kaya-chatbot python run_full_pipeline.py --dataset-variant b 2>&1 | tee pipeline_output_b.log
          cat pipeline_output_a.log pipeline_output_b.log > pipeline_output.log
          echo "COMPARE_COMPLETE: A/B dataset variants built" >> pipeline_output.log

      - name: Run generate-datasets (data pipeline only, no training)
        if: steps.mode.outputs.mode == 'generate-datasets'
        timeout-minutes: 60
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/data/generate_synthetic_data.py 2>&1 | tee pipeline_output.log

      - name: Detect pipeline outcome
        id: outcome
        if: always()
        run: |
          # Determine whether the pipeline step itself succeeded.
          # We check for the presence of success markers in the log; absence means failure.
          LOG=pipeline_output.log
          if [[ -f "$LOG" ]]; then
            if grep -qiE "(Training Completed|FULL PIPELINE COMPLETE|Pipeline finished successfully|passed|Benchmark complete|Evaluation complete|Inference tests complete|COMPARE_COMPLETE)" "$LOG"; then
              echo "failed=false" >> "$GITHUB_OUTPUT"
            else
              echo "failed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${{ steps.mode.outputs.mode }}" >> "$GITHUB_OUTPUT"

      - name: Upload pipeline log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pipeline-output-${{ github.run_id }}
          path: pipeline_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Auto-commit benchmark tasks to tasks.json
        # When the benchmark emits pending tasks, append them to the tracked
        # tasks.json file and push. The push to main (or PR branch) triggers
        # create-issues-from-tasks.yml which creates GitHub Issues for the agent.
        if: always() && steps.mode.outputs.mode == 'benchmark'
        run: |
          REAL_PROJECT=/home/gustavo/Desktop/KayaChatBot
          TASKS_GEN="$REAL_PROJECT/data/benchmark_tasks.json"
          TASKS_TRACKED="$GITHUB_WORKSPACE/tasks.json"

          if [[ -f "$TASKS_GEN" ]] && [[ -s "$TASKS_GEN" ]]; then
            echo "Found benchmark tasks in $TASKS_GEN"
            # Merge new tasks into tasks.json without duplicates
            python3 -c "
            import json, pathlib, os
            tg = pathlib.Path(os.environ['TASKS_GEN'])
            tt = pathlib.Path(os.environ['TASKS_TRACKED'])
            new = json.loads(tg.read_text())
            old = json.loads(tt.read_text()) if tt.exists() else []
            titles = {t.get('title') for t in old}
            added = [t for t in new if t.get('title') not in titles]
            tt.write_text(json.dumps(old + added, indent=2, ensure_ascii=False))
            print(f'Merged {len(added)} new task(s) into tasks.json ({len(old)+len(added)} total)')
            "
            # Commit and push if anything was added
            cd "$GITHUB_WORKSPACE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if git diff --quiet tasks.json; then
              echo "No new tasks to commit."
            else
              git add tasks.json
              git commit -m "chore: add benchmark failure tasks [skip ci]"
              git push
              echo "Committed and pushed updated tasks.json"
            fi
            # Clear processed tasks
            echo "[]" > "$TASKS_GEN"
          else
            echo "No benchmark_tasks.json found or file is empty — nothing to commit."
          fi

      - name: Parse and post results
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const path = require('path');
            const workspace = process.env.GITHUB_WORKSPACE;
            const logFile = path.join(workspace, 'pipeline_output.log');
            const mode = '${{ steps.mode.outputs.mode }}';

            let markdown;
            try {
              markdown = execSync(
                `python3 .github/scripts/post-gpu-results.py "${logFile}" "${mode}"`,
                { cwd: workspace, timeout: 30000 }
              ).toString().trim();
            } catch (err) {
              markdown = `## \ud83d\udda5\ufe0f GPU Pipeline Results \u2014 \`${mode}\`\n\n\u274c Failed to parse pipeline output.\n\n\`\`\`\n${err.stderr || err.message}\n\`\`\``;
            }

            // Write to job summary
            await core.summary.addRaw(markdown).write();

            // Post as PR comment if this is a pull_request event
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: markdown
              });
            }

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker-compose down --rmi local --volumes --remove-orphans 2>/dev/null || true

      - name: Fail job if pipeline failed
        # This must be the LAST step. It causes the GitHub job to report
        # conclusion=failure so the GPU Pipeline Failure Handler triggers
        # and creates an auto-issue for the Copilot bug-fixer agent.
        # continue-on-error on pipeline steps is intentional (lets us capture
        # logs and artifacts even when the command exits non-zero); this step
        # converts the log-detected failure back into a real job failure.
        if: always() && steps.outcome.outputs.failed == 'true'
        run: |
          echo "Pipeline reported failure. Failing the job to activate the self-healing handler."
          exit 1
