name: "GPU Pipeline"

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "config.docker.yaml"
      - "data/train_synthetic.jsonl"
      - "data/val_synthetic.jsonl"
      - "run_full_pipeline.py"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"
      - ".github/scripts/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode to run"
        required: true
        default: "finetune"
        type: choice
        options:
          - finetune
          - evaluate
          - inference-test
          - full-pipeline
          - benchmark

permissions:
  contents: read
  pull-requests: write

jobs:
  gpu-pipeline:
    runs-on: self-hosted
    timeout-minutes: 240
    outputs:
      failed: ${{ steps.outcome.outputs.failed }}
      mode: ${{ steps.outcome.outputs.mode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine run mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=finetune" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare environment
        run: |
          # ---------------------------------------------------------------
          # Data directories: gitignored, so the checkout lacks them.
          # Since this runner IS the project machine, we symlink from the
          # real project directory so Docker gets the actual source data.
          # ---------------------------------------------------------------
          REAL_PROJECT=/home/gustavo/Desktop/KayaChatBot

          mkdir -p models reports/benchmarks

          # Sync data files from real project into checkout
          mkdir -p data
          for item in wpp insta facebook all_messages_cleaned.jsonl finetune_chunks.jsonl cleaning_stats.json; do
            SRC="$REAL_PROJECT/data/$item"
            DST="data/$item"
            if [[ -e "$SRC" && ! -e "$DST" ]]; then
              ln -sf "$SRC" "$DST"
              echo "  Linked: $DST -> $SRC"
            fi
          done

          # Use real .env (contains API keys needed inside Docker)
          if [[ -f "$REAL_PROJECT/.env" && ! -f ".env" ]]; then
            ln -sf "$REAL_PROJECT/.env" .env
            echo "  Linked: .env -> $REAL_PROJECT/.env"
          elif [[ ! -f "$REAL_PROJECT/.env" ]]; then
            touch .env
            echo "  Warning: no .env found in $REAL_PROJECT, created empty .env"
          fi

          echo "Data directory contents:"
          ls -la data/

      - name: Build Docker image
        run: docker-compose build

      - name: Run finetune
        if: steps.mode.outputs.mode == 'finetune'
        timeout-minutes: 240
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/finetuning/train.py 2>&1 | tee pipeline_output.log

      - name: Run full pipeline
        if: steps.mode.outputs.mode == 'full-pipeline'
        timeout-minutes: 240
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python run_full_pipeline.py 2>&1 | tee pipeline_output.log

      - name: Run evaluate (test suite)
        if: steps.mode.outputs.mode == 'evaluate'
        timeout-minutes: 10
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python -m pytest tests/ -v 2>&1 | tee pipeline_output.log

      - name: Run inference test
        if: steps.mode.outputs.mode == 'inference-test'
        timeout-minutes: 10
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/chat/inference.py 2>&1 | tee pipeline_output.log

      - name: Run benchmark
        if: steps.mode.outputs.mode == 'benchmark'
        timeout-minutes: 60
        continue-on-error: true
        run: |
          docker-compose run --rm kaya-chatbot python src/testing/benchmark.py 2>&1 | tee pipeline_output.log

      - name: Detect pipeline outcome
        id: outcome
        if: always()
        run: |
          # Determine whether the pipeline step itself succeeded.
          # We check for the presence of success markers in the log; absence means failure.
          LOG=pipeline_output.log
          if [[ -f "$LOG" ]]; then
            if grep -qiE "(Training Completed|passed|Benchmark complete)" "$LOG"; then
              echo "failed=false" >> "$GITHUB_OUTPUT"
            else
              echo "failed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${{ steps.mode.outputs.mode }}" >> "$GITHUB_OUTPUT"

      - name: Upload pipeline log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: pipeline_output.log
          retention-days: 7
          if-no-files-found: warn

      - name: Parse and post results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const path = require('path');
            const workspace = process.env.GITHUB_WORKSPACE;
            const logFile = path.join(workspace, 'pipeline_output.log');
            const mode = '${{ steps.mode.outputs.mode }}';

            let markdown;
            try {
              markdown = execSync(
                `python3 .github/scripts/post-gpu-results.py "${logFile}" "${mode}"`,
                { cwd: workspace, timeout: 30000 }
              ).toString().trim();
            } catch (err) {
              markdown = `## \ud83d\udda5\ufe0f GPU Pipeline Results \u2014 \`${mode}\`\n\n\u274c Failed to parse pipeline output.\n\n\`\`\`\n${err.stderr || err.message}\n\`\`\``;
            }

            // Write to job summary
            await core.summary.addRaw(markdown).write();

            // Post as PR comment if this is a pull_request event
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: markdown
              });
            }

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker-compose down --rmi local --volumes --remove-orphans 2>/dev/null || true

      - name: Fail job if pipeline failed
        # This must be the LAST step. It causes the GitHub job to report
        # conclusion=failure so the GPU Pipeline Failure Handler triggers
        # and creates an auto-issue for the Copilot bug-fixer agent.
        # continue-on-error on pipeline steps is intentional (lets us capture
        # logs and artifacts even when the command exits non-zero); this step
        # converts the log-detected failure back into a real job failure.
        if: always() && steps.outcome.outputs.failed == 'true'
        run: |
          echo "Pipeline reported failure. Failing the job to activate the self-healing handler."
          exit 1
