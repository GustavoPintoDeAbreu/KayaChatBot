name: "Copilot Setup Steps"

# Validate on changes and allow manual testing
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be called `copilot-setup-steps` for Copilot to pick it up
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Use lightweight deps — full ML stack (torch, unsloth, etc.) exceeds runner disk
          pip install -r requirements-copilot.txt

      - name: Verify environment
        run: |
          python --version
          python -c "import yaml, pydantic, openai; print('Core imports OK')"
