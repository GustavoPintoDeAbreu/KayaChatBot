name: Deploy (prod)

# Make a chosen commit the LIVE prod web app. Run after the change is on main.
# The `prod` GitHub Environment has a required-reviewer rule, so the run pauses
# for approval before it touches the live site.
#
# Deploys into the dedicated ~/kaya-prod checkout (separate from the dev copy)
# and restarts the always-on prod container — see scripts/deploy_prod.sh and
# DEPLOYMENT.md. One-time: clone ~/kaya-prod and symlink models/ + data/.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit/tag/branch) to make live"
        type: string
        default: main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: [self-hosted, gpu]
    environment: prod
    steps:
      - name: Checkout (for the deploy script)
        uses: actions/checkout@v4

      - name: Write prod .env from secrets
        run: |
          PROD_DIR="${KAYA_PROD_DIR:-$HOME/kaya-prod}"
          mkdir -p "$PROD_DIR"
          cat > "$PROD_DIR/.env" <<EOF
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          AZURE_OPENAI_API_KEY_gpt_41_mini=${{ secrets.AZURE_OPENAI_API_KEY_gpt_41_mini }}
          AZURE_OPENAI_API_KEY_gpt_53_chat=${{ secrets.AZURE_OPENAI_API_KEY_gpt_53_chat }}
          KAYA_WEB_USER=${{ secrets.KAYA_WEB_USER }}
          KAYA_WEB_PASS=${{ secrets.KAYA_WEB_PASS }}
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          EOF

      - name: Deploy to prod (build + restart live container)
        run: ./scripts/deploy_prod.sh "${{ inputs.ref }}"

      - name: Summary
        run: |
          echo "### Prod deployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "Ref \`${{ inputs.ref }}\` is now live at the prod hostname." >> "$GITHUB_STEP_SUMMARY"
