# Kaya ChatBot Fine-Tuning Configuration (Docker Version)
# All paths use Linux conventions for Docker container

# Test Mode Settings
# Set enabled: true for quick testing with minimal data/epochs
# Set enabled: false for full production runs
test_mode:
  enabled: false  # PRODUCTION MODE - Generate full dataset
  
  # Test mode data generation limits
  extraction:
    instagram_files_limit: 1  # Only process first Instagram file
  
  generation:
    chunks_limit: 3  # Only process first 3 finetune chunks
    conversations_per_chunk: 4  # Generate only 4 conversations per chunk
  
  portuguese:
    examples_limit: 100  # Only use 100 Portuguese examples
  
  # Test mode training parameters (fast training for validation)
  training:
    max_steps: 50  # Just 50 steps for quick validation
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 2
    save_steps: 25
    eval_steps: 25
    logging_steps: 5

# Generation Settings
generation:
  provider: "xai"  # Options: "azure" or "xai" - using xai by default for better results
  
  # Azure OpenAI settings
  azure:
    endpoint: "https://kaya-openai.openai.azure.com/"
    api_version: "2024-12-01-preview"
    model: "gpt-4.1-mini"
    max_tokens: 16000  # GPT-4.1-mini max output: 16K tokens
    temperature: 0.85
    timeout: 120  # Increased for larger outputs
  
  # xAI (Grok) settings
  xai:
    model: "grok-4-1-fast-reasoning"
    max_tokens: 30000  # Grok-4 max output: 32K tokens (using 30K to be safe)
    temperature: 0.85
    timeout: 120  # Increased for larger outputs
  
  # Retry settings (applies to both providers)
  retry:
    max_attempts: 5
    delay_seconds: 30

# Data Processing Settings
data:
  # New synthetic data pipeline
  train_file: "/app/data/train_synthetic.jsonl"
  val_file: "/app/data/val_synthetic.jsonl"
  
  # Legacy files (for reference)
  input_file: "/app/data/wpp/WhatsApp Chat with Kaya 👀.txt"
  output_file: "/app/data/processed_chat.jsonl"
  
  # Token-based chunking settings
  max_tokens_per_chunk: 2048
  overlap_tokens: 256
  
  # Data split
  train_test_split: 0.9
  
  # Persona settings
  system_prompt: "És o bot assistente do grupo de amigos 'Kaya'. Tens memória de factos, eventos e pessoas que aprendeste através das conversas passadas do grupo. Quando te fazem perguntas, respondes com base no que sabes dessas conversas. Podes conversar de forma casual e amigável. Fala em português europeu ou inglês de forma natural. Não és um membro do grupo — és um bot com acesso à memória coletiva do grupo."
  group_members_file: "/app/data/group_members.json"
  
  # LLM-based data cleaning settings
  cleaning:
    enabled: true  # Always use LLM cleaning (no fallback)
    batch_size: 10  # Messages per API call
    confidence_threshold: 0.7  # Minimum confidence to accept decision
    cache_file: "/app/data/.cleaning_cache.json"
    stats_file: "/app/data/cleaning_stats.json"

# Pipeline Settings
pipeline:
  skip_synthetic: true

# Model Settings
model:
  model_id: "unsloth/Qwen3-14B-bnb-4bit"
  max_seq_length: 4096  # Start at 4096; test 8192 if VRAM allows (Qwen3 supports up to 128K)
  load_in_4bit: true
  
  # LoRA settings
  lora_r: 32
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training Settings
training:
  output_dir: "/app/models/kaya_v2_synthetic"
  
  # Training hyperparameters (optimized for 2000+ synthetic examples)
  max_steps: 1500  # Reduced from 6000 to prevent overfitting (~1 epoch for larger dataset)
  per_device_train_batch_size: 1  # Reduced due to longer multi-turn conversations
  gradient_accumulation_steps: 8  # Effective batch size = 1 * 8 = 8
  
  learning_rate: 0.0001  # 1e-4 (reduced from 2e-4 to preserve base model reasoning)
  warmup_steps: 100
  weight_decay: 0.01
  
  # Optimization
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"
  
  # Logging and checkpointing
  logging_steps: 25
  save_steps: 200
  eval_steps: 100  # Evaluate every 100 steps (adjusted for larger dataset)
  
  # Mixed precision
  fp16: false  # Will be auto-detected
  bf16: false  # Will be auto-detected
  
  # Other
  seed: 3407
  dataset_num_proc: 2
  packing: false

  # Incremental retraining settings
  resume_from_checkpoint: null  # Path to existing LoRA checkpoint (e.g. /app/models/kaya_v2_synthetic/); null = train from scratch
  incremental_steps: 500  # Fewer steps for incremental training (vs 1500 for full retrain)
  incremental_learning_rate: 0.00005  # Lower LR to avoid catastrophic forgetting (5e-5 vs 1e-4)

# Inference Settings
inference:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

# RAG Settings
rag:
  enabled: true
  always_on: true
  vector_db: "chromadb"
  embedding_model: "BAAI/bge-m3"  # Multi-lingual, multi-granularity, multi-functionality — best for messy chat retrieval
  chunk_size_tokens: 300
  chunk_overlap_tokens: 50
  top_k: 5
  filter_by_person: true
  knowledge_approach: "both"
  knowledge_base:
    enabled: true
    file: "/app/data/group_knowledge.json"
    collection_name: "kaya_knowledge_base"
    top_k: 3
