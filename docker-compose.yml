services:
  # ──────────────────────────────────────────────────────────────
  # Base service definition — shared by all profiles.
  # Concrete services (train / infer / data) extend this via
  # Docker Compose's 'extends' directive so all GPU/volume/env
  # settings are inherited automatically.
  # ──────────────────────────────────────────────────────────────
  kaya-base:
    build:
      context: .
      dockerfile: Dockerfile
    image: kaya-chatbot:2.0.0

    # Enable single GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Volume mounts shared by all services
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro

    # Load environment variables from .env file
    env_file:
      - .env

    # Environment variables for GPU and caching
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/app/models/.cache
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512

    stdin_open: true
    tty: true
    working_dir: /app
    runtime: nvidia

  # ──────────────────────────────────────────────────────────────
  # kaya-chatbot  — default service (no profile required).
  # Runs the full pipeline (data → training → vector DB).
  # Usage: docker-compose up kaya-chatbot
  #        docker-compose run --rm kaya-chatbot python <script>
  # ──────────────────────────────────────────────────────────────
  kaya-chatbot:
    extends:
      service: kaya-base
    container_name: kaya-chatbot
    command: python run_full_pipeline.py

  # ──────────────────────────────────────────────────────────────
  # kaya-train  [profile: train]
  # Runs only the fine-tuning step against the pre-built dataset.
  # Usage: docker-compose --profile train up kaya-train
  #        docker-compose --profile train run --rm kaya-train
  # ──────────────────────────────────────────────────────────────
  kaya-train:
    extends:
      service: kaya-base
    container_name: kaya-train
    profiles: [train]
    command: python src/finetuning/train.py

  # ──────────────────────────────────────────────────────────────
  # kaya-infer  [profile: infer]
  # Launches the interactive chat interface with RAG enabled.
  # Usage: docker-compose --profile infer run --rm kaya-infer
  # ──────────────────────────────────────────────────────────────
  kaya-infer:
    extends:
      service: kaya-base
    container_name: kaya-infer
    profiles: [infer]
    command: python src/chat/chat.py

  # ──────────────────────────────────────────────────────────────
  # kaya-data  [profile: data]
  # Rebuilds the ChromaDB vector database from existing knowledge
  # files (data/group_knowledge.json + data/all_messages_cleaned.jsonl).
  # No training performed — useful after adding new knowledge entries.
  # Usage: docker-compose --profile data up kaya-data
  # ──────────────────────────────────────────────────────────────
  kaya-data:
    extends:
      service: kaya-base
    container_name: kaya-data
    profiles: [data]
    command: python src/data/build_vector_db.py

  # ──────────────────────────────────────────────────────────────
  # kaya-dev  [profile: dev]
  # Development container: serves the Gradio web UI with ./src mounted
  # read-write so live code edits are picked up without a rebuild.
  # On-demand only — start via scripts/app_up.sh dev (not at boot).
  # NOTE: dev and prod share the single GPU — run ONE at a time.
  # Usage: scripts/app_up.sh dev   (or: docker compose --profile dev up -d kaya-dev)
  # ──────────────────────────────────────────────────────────────
  kaya-dev:
    extends:
      service: kaya-base
    container_name: kaya-dev
    profiles: [dev]
    # Override the base ./src:ro mount so edits inside the repo are live.
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./configs:/app/configs:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
    # Publish on 7861 for optional LAN access; the Cloudflare Tunnel reaches the
    # container directly over the compose network on the same port.
    ports:
      - "7861:7861"
    # Bind Gradio to all interfaces inside the container so the published port
    # and the tunnel can reach it. KAYA_WEB_USER/PASS come from .env (env_file).
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/app/models/.cache
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - GRADIO_SERVER_NAME=0.0.0.0
      - KAYA_WEB_PORT=7861
      - KAYA_ENV=dev
      - KAYA_VERSION=${KAYA_VERSION:-unknown}
    command: python src/chat/web_app.py

  # ──────────────────────────────────────────────────────────────
  # kaya-prod  [profile: prod]
  # The always-on production web app. Deployed via scripts/deploy_prod.sh
  # (from the ~/kaya-prod checkout) and kept running by restart: unless-stopped,
  # so it auto-recovers after a reboot once Docker starts on boot
  # (`sudo systemctl enable docker`). See DEPLOYMENT.md.
  # NOTE: dev and prod share the single GPU — only one runs at a time.
  # ──────────────────────────────────────────────────────────────
  kaya-prod:
    extends:
      service: kaya-base
    container_name: kaya-prod
    profiles: [prod]
    restart: unless-stopped
    depends_on: [waha]
    ports:
      - "7860:7860"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/app/models/.cache
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - GRADIO_SERVER_NAME=0.0.0.0
      - KAYA_WEB_PORT=7860
      - KAYA_ENV=prod
      - KAYA_VERSION=${KAYA_VERSION:-unknown}
      # Prod serves generation from the llama.cpp gguf server (the `llama`
      # service). Overrides config.yaml's hf default. Set to hf to roll back.
      - KAYA_INFERENCE_BACKEND=${KAYA_INFERENCE_BACKEND:-gguf}
      - KAYA_WAHA_URL=http://waha:3000
      - KAYA_WAHA_API_KEY=${KAYA_WAHA_API_KEY:-}
      - KAYA_WHATSAPP_WEBHOOK_TOKEN=${KAYA_WHATSAPP_WEBHOOK_TOKEN:-}
    # Serves the Gradio UI AND the WhatsApp webhook on one loaded model.
    command: python -m src.chat.whatsapp_server

  # ──────────────────────────────────────────────────────────────
  # llama  [profile: gguf]
  # llama.cpp GGUF inference server — the fast backend. When
  # inference.backend=gguf, the app process holds only the tokenizer + RAG
  # retriever and sends generation here (reachable as http://llama:8080 on the
  # compose network). Serves the merged fine-tuned model at Q6_K (~15x faster
  # than the in-process bnb-4bit model, at parity quality). Bring up alongside
  # prod: `docker compose --profile prod --profile gguf up -d` (set backend=gguf).
  # ──────────────────────────────────────────────────────────────
  llama:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda
    container_name: kaya-llama
    profiles: [gguf]
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./models/gguf:/models:ro
    entrypoint: /app/llama-server
    # -fa off is required for the Gemma-4 MTP arch / KV layout; --jinja avoids a
    # template crash. The app strips its own leading BOS to prevent a double-BOS.
    command: >
      -m /models/kaya-wpp-Q6_K.gguf -ngl 999 -fa off --jinja
      --host 0.0.0.0 --port 8080 -c 4096
    expose:
      - "8080"

  # ──────────────────────────────────────────────────────────────
  # cloudflared  [profile: tunnel]
  # Cloudflare Tunnel sidecar — exposes kaya-dev/kaya-prod to the internet
  # via a remotely-managed tunnel (hostname→service ingress configured in the
  # Cloudflare dashboard). No inbound ports are opened on the host.
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env. See DEPLOYMENT.md.
  # ──────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kaya-cloudflared
    profiles: [tunnel]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

  # ──────────────────────────────────────────────────────────────
  # waha  [profile: whatsapp]
  # Self-hosted WhatsApp HTTP API (https://waha.devlike.pro). Wraps the
  # WhatsApp Web protocol behind REST + webhooks so the Python bridge speaks
  # plain HTTP (no Node in our codebase). Links a DEDICATED number via QR at
  # the WAHA dashboard (http://localhost:3000) — never the personal number.
  # It POSTs inbound messages to the live bridge (kaya-prod, which runs
  # whatsapp_server and serves the UI + webhook). The [whatsapp] profile is the
  # on-demand dev variant that targets kaya-whatsapp instead. See WHATSAPP.md.
  # Usage (dev): docker compose --profile whatsapp up -d waha kaya-whatsapp
  # ──────────────────────────────────────────────────────────────
  waha:
    image: devlikeapro/waha:latest
    container_name: kaya-waha
    # In the [prod] profile too so it starts alongside kaya-prod (the live bridge);
    # [whatsapp] is the on-demand dev variant pointing at kaya-whatsapp.
    profiles: [whatsapp, prod]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # WAHA dashboard / REST — localhost only
    volumes:
      - ./data/waha:/app/.sessions   # persist the linked-device session
    environment:
      # NOWEB (Baileys, websocket) instead of the default browser-based WEBJS:
      # no Chromium, far more stable on a server, reliable pairing-code linking.
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      # Auto-start a session named "default"; scan its QR at http://localhost:3000.
      - WHATSAPP_START_SESSION=default
      # WAHA pushes inbound messages to the live bridge (kaya-prod) on the compose network.
      - WHATSAPP_HOOK_URL=http://kaya-prod:7860/whatsapp/webhook
      # `message.reaction` lets users 👍/👎 a bot reply as feedback (src/chat/feedback.py).
      - WHATSAPP_HOOK_EVENTS=message,message.reaction
      - WAHA_API_KEY=${KAYA_WAHA_API_KEY:-}
      # Stable dashboard/swagger login (otherwise WAHA generates a random password
      # each boot). Reuses the web-app creds so the QR page at :3000 is easy to reach.
      - WAHA_DASHBOARD_USERNAME=${KAYA_WEB_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${KAYA_WEB_PASS:-admin}
      - WHATSAPP_SWAGGER_USERNAME=${KAYA_WEB_USER:-admin}
      - WHATSAPP_SWAGGER_PASSWORD=${KAYA_WEB_PASS:-admin}
      # Forward the shared secret so the bridge can verify the webhook.
      # Format is Header:Value pairs separated by ';'.
      - WHATSAPP_HOOK_CUSTOM_HEADERS=X-Webhook-Token:${KAYA_WHATSAPP_WEBHOOK_TOKEN:-}

  # ──────────────────────────────────────────────────────────────
  # kaya-whatsapp  [profile: whatsapp]
  # The bridge process: serves the Gradio UI AND the WhatsApp webhook on the
  # same loaded model (python -m src.chat.whatsapp_server). Shares the single GPU
  # with kaya-prod/kaya-dev — run only ONE of the three at a time.
  # Usage: docker compose --profile whatsapp up -d waha kaya-whatsapp
  # ──────────────────────────────────────────────────────────────
  kaya-whatsapp:
    extends:
      service: kaya-base
    container_name: kaya-whatsapp
    profiles: [whatsapp]
    depends_on: [waha]
    ports:
      - "7860:7860"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/app/models/.cache
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - GRADIO_SERVER_NAME=0.0.0.0
      - KAYA_WEB_PORT=7860
      - KAYA_ENV=whatsapp
      - KAYA_VERSION=${KAYA_VERSION:-unknown}
      - KAYA_WAHA_URL=http://waha:3000
      - KAYA_WAHA_API_KEY=${KAYA_WAHA_API_KEY:-}
      - KAYA_WHATSAPP_WEBHOOK_TOKEN=${KAYA_WHATSAPP_WEBHOOK_TOKEN:-}
      - KAYA_WHATSAPP_DEBUG=${KAYA_WHATSAPP_DEBUG:-}
    command: python -m src.chat.whatsapp_server

  # ──────────────────────────────────────────────────────────────
  # kaya-test  [profile: test]
  # Runs the automated test suite inside the container against the
  # mounted source and data. No training/inference performed.
  # Usage: docker-compose --profile test run --rm kaya-test
  # ──────────────────────────────────────────────────────────────
  kaya-test:
    extends:
      service: kaya-base
    container_name: kaya-test
    profiles: [test]
    command: python -m pytest tests/ -v

