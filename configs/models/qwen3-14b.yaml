# Model profile: Qwen3-14B (default)
# RTX 3090 VRAM budget: ~15 GB in 4-bit + LoRA (safe headroom)
model:
  model_id: "unsloth/Qwen3-14B-bnb-4bit"
  max_seq_length: 4096
  load_in_4bit: true
  lora_r: 32
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./models/kaya_v2_synthetic"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
