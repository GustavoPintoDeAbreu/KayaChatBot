# Model profile: Gemma 4 E4B variant (approximately 8 billion active parameters, fits on RTX 3090 24 GB)
# RTX 3090 VRAM budget: ~11 GB in 4-bit + LoRA (comfortable headroom)
# NOTE: Gemma 4 uses <|turn> chat template tokens; thinking mode is disabled
#       for SFT (do NOT add <|think|> to the system prompt during training).
model:
  model_id: "unsloth/gemma-4-E4B-it-unsloth-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./models/kaya_gemma4_synth_v8"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.00005
