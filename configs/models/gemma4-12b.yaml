# ============================================================
# Model preset: Gemma 4 — 12B (newly released April 2026)
# ============================================================
# Best for: RTX 3090 (24 GB VRAM) — uses ~8 GB at 4-bit.
# Gemma 4 supports up to 128 K context; we use 8192 here
# to balance memory and conversation quality.
#
# Requirements:
#   - unsloth >= 2026.4.2  (already pinned in requirements.txt)
#   - transformers >= 4.51  (already pinned in requirements.txt)
#
# To switch to this model, copy the model_id and lora/training
# blocks below into config.yaml (or config.docker.yaml) under
# the `model:` and `training:` keys.
# ============================================================

model_id: "unsloth/gemma-4-12b-it-bnb-4bit"
max_seq_length: 8192
load_in_4bit: true

# LoRA adapter settings (same architecture as Qwen3)
lora_r: 32
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Output directory for this model's checkpoints
training_output_dir: "./models/kaya_gemma4_12b"
docker_output_dir: "/app/models/kaya_gemma4_12b"
