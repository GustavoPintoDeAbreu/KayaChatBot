# Kaya ChatBot Fine-Tuning Configuration

# Test Mode Settings
# Set enabled: true for quick testing with minimal data/epochs
# Set enabled: false for full production runs
test_mode:
  enabled: false  # PRODUCTION MODE - Generate full dataset
  
  # Test mode data generation limits
  extraction:
    instagram_files_limit: 1  # Only process first Instagram file
  
  generation:
    chunks_limit: 3  # Only process first 3 finetune chunks
    conversations_per_chunk: 4  # Generate only 4 conversations per chunk
  
  portuguese:
    examples_limit: 100  # Only use 100 Portuguese examples
  
  # Test mode training parameters (fast training for validation)
  training:
    max_steps: 50  # Just 50 steps for quick validation
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 2
    save_steps: 25
    eval_steps: 25
    logging_steps: 5

# Generation Settings
generation:
  provider: "xai"  # Options: "azure" or "xai"
  
  # Azure OpenAI settings
  azure:
    endpoint: "https://kaya-openai.openai.azure.com/"
    api_version: "2024-12-01-preview"
    model: "gpt-4.1-mini"
    max_tokens: 16000  # GPT-4.1-mini max output: 16K tokens
    temperature: 0.85
    timeout: 120  # Increased for larger outputs
  
  # xAI (Grok) settings
  xai:
    model: "grok-4-1-fast-reasoning"
    max_tokens: 30000  # Grok-4 max output: 32K tokens (using 30K to be safe)
    temperature: 0.85
    timeout: 120  # Increased for larger outputs
  
  # Retry settings (applies to both providers)
  retry:
    max_attempts: 5
    delay_seconds: 30

# Data Processing Settings

# Data Processing Settings
data:
  # New synthetic data pipeline
  train_file: "C:\\Users\\guga\\Desktop\\KayaChatBot\\data\\train_synthetic.jsonl"
  val_file: "C:\\Users\\guga\\Desktop\\KayaChatBot\\data\\val_synthetic.jsonl"
  
  # Legacy files (for reference)
  input_file: "C:\\Users\\guga\\Desktop\\KayaChatBot\\data\\wpp\\WhatsApp Chat with Kaya 👀 - gugu.txt"
  output_file: "C:\\Users\\guga\\Desktop\\KayaChatBot\\data\\processed_chat.jsonl"
  
  # Token-based chunking settings
  max_tokens_per_chunk: 2048  # Keep chunks smaller than max_seq_length for safety
  overlap_tokens: 256  # Overlap between chunks for continuity
  
  # Data split
  train_test_split: 0.9  # 90% train, 10% validation
  
  # Persona settings
  system_prompt: "És um assistente que conhece bem um grupo de WhatsApp português. Quando te dão histórico de conversas passadas, responde às perguntas com base no que foi dito. Também podes conversar casualmente como membro do grupo. Fala português europeu informal com calão. Usa mensagens curtas estilo WhatsApp."

# Model Settings
model:
  model_id: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  max_seq_length: 4096  # Maximum context length
  load_in_4bit: true
  
  # LoRA settings
  lora_r: 32
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training Settings
training:
  output_dir: "C:\\Users\\guga\\Desktop\\KayaChatBot\\models\\kaya_v2_synthetic"
  
  # Training hyperparameters (optimized for 2000+ synthetic examples)
  max_steps: 1500  # Reduced from 6000 to prevent overfitting (~1 epoch for larger dataset)
  per_device_train_batch_size: 1  # Reduced due to longer multi-turn conversations
  gradient_accumulation_steps: 8  # Effective batch size = 1 * 8 = 8
  
  learning_rate: 0.0001  # 1e-4 (reduced from 2e-4 to preserve base model reasoning)
  warmup_steps: 100
  weight_decay: 0.01
  
  # Optimization
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"  # Changed from linear for better convergence
  
  # Logging and checkpointing
  logging_steps: 25
  save_steps: 200
  eval_steps: 100  # Evaluate every 100 steps (adjusted for larger dataset)
  
  # Mixed precision
  fp16: false  # Will be auto-detected
  bf16: false  # Will be auto-detected
  
  # Other
  seed: 3407
  dataset_num_proc: 2
  packing: false

# Inference Settings
inference:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

# RAG Settings
rag:
  enabled: true
  vector_db: "chromadb"
  embedding_model: "Alibaba-NLP/gte-multilingual-base"  # Best Portuguese performance, 8192 token context
  chunk_size_tokens: 300
  chunk_overlap_tokens: 50
  top_k: 5
  filter_by_person: true
